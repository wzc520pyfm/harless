name: release
on:
  push:
    tags: ['v*']
jobs:
  # Always runs on tag: same checks as local `pnpm release` (install, build, test).
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm -r test

  # Optional: only when repository secret NPM_TOKEN is set (OIDC provenance).
  publish-npm:
    needs: verify
    if: secrets.NPM_TOKEN != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm -F harless publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Release notes from CHANGELOG
        id: notes
        env:
          TAG_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          VERSION="${TAG_NAME#v}"
          NOTES="${RUNNER_TEMP}/release-notes.md"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { flag = 1; next }
            flag && $0 ~ /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md > "$NOTES" || true
          if ! grep -q '[^[:space:]]' "$NOTES" 2>/dev/null; then
            {
              echo "## ${TAG_NAME}"
              echo
              echo "See [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/${TAG_NAME}/CHANGELOG.md) for details."
            } > "$NOTES"
          fi
          echo "path=${NOTES}" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: harless ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.path }}
          generate_release_notes: true
